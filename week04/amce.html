<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACME Table Activity</title>
    <link rel="stylesheet" href="styles/amce.css">
</head>

<body>
    <main>
        <table>
            <caption>Table 1: Account Feature Comparison</caption>
            <thead>
                <tr>
                    <th colspan="4" scope="colgroup">ACME Wildwest Services</th>
                </tr>
                <tr>
                    <th scope="col"></th>
                    <th scope="col">Basic</th>
                    <th scope="col">Premium</th>
                    <th scope="col">Deluxe</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th scope="row">Feature 1</th>
                    <td class="yes">✔</td>
                    <td class="yes">✔</td>
                    <td class="yes">✔</td>
                </tr>
                <tr>
                    <th scope="row">Feature 2</th>
                    <td class="no">✘</td>
                    <td class="yes">✔</td>
                    <td class="yes">✔</td>
                </tr>
                <tr>
                    <th scope="row">Feature 3</th>
                    <td class="no">✘</td>
                    <td class="no">✘</td>
                    <td class="yes">✔</td>
                </tr>
            </tbody>
        </table>
    </main>
</body>

</html>
