<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Product review form for WDD 131 Week 05.">
    <meta name="author" content="Justin Fink">

    <title>Product Review Form | Justin Fink | WDD 131</title>

    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>

    <header>
        <h1>Product Review</h1>
        <p class="header-subtitle">Share your experience with the product you installed.</p>
    </header>

    <main>

        <form method="get" action="review.html" class="review-form">

            <p class="required-note">* indicates a required field</p>

            <div class="form-group">
                <label for="productName">Product Name *</label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>
            </div>

            <fieldset class="form-group rating-group">
                <legend>Overall Rating *</legend>

                <div class="rating-options">

                    <label for="star1" class="rating-label">
                        <span class="stars">★</span>
                        <input type="radio" id="star1" name="rating" value="1" required>
                    </label>

                    <label for="star2" class="rating-label">
                        <span class="stars">★★</span>
                        <input type="radio" id="star2" name="rating" value="2" required>
                    </label>

                    <label for="star3" class="rating-label">
                        <span class="stars">★★★</span>
                        <input type="radio" id="star3" name="rating" value="3" required>
                    </label>

                    <label for="star4" class="rating-label">
                        <span class="stars">★★★★</span>
                        <input type="radio" id="star4" name="rating" value="4" required>
                    </label>

                    <label for="star5" class="rating-label">
                        <span class="stars">★★★★★</span>
                        <input type="radio" id="star5" name="rating" value="5" required>
                    </label>

                </div>
            </fieldset>

            <div class="form-group">
                <label for="installDate">Date of Installation *</label>
                <input type="date" id="installDate" name="installDate" required>
            </div>

            <fieldset class="form-group">
                <legend>Which features did you find useful in the product?<br>
                    <span>(Check all that apply)</span>
                </legend>

                <label for="durability" class="checkbox-label">
                    <input type="checkbox" id="durability" name="features" value="Durability">
                    Durability
                </label>

                <label for="easeOfUse" class="checkbox-label">
                    <input type="checkbox" id="easeOfUse" name="features" value="Ease of Use">
                    Ease of Use
                </label>

                <label for="performance" class="checkbox-label">
                    <input type="checkbox" id="performance" name="features" value="Performance">
                    Performance
                </label>

                <label for="design" class="checkbox-label">
                    <input type="checkbox" id="design" name="features" value="Design">
                    Design
                </label>

            </fieldset>

            <div class="form-group">
                <label for="writtenReview">Written Review <span>(Optional)</span></label>
                <textarea id="writtenReview" name="writtenReview" rows="5"></textarea>
            </div>

            <div class="form-group">
                <label for="userName">Your Name <span>(Optional)</span></label>
                <input type="text" id="userName" name="userName">
            </div>

            <div class="form-group">
                <input type="submit" value="Post Review" class="submit-button">
            </div>

        </form>

    </main>

    <footer>
        <p>&copy;<span id="currentyear"></span> Justin Fink | Utah</p>
        <p id="lastModified"></p>
    </footer>

</body>

</html>
